# ============================================================================
# PERSONA TEMPLATE — copy this file to data/personas/<your-id>.yaml and fill it in.
#
#   cp data/personas/_template.yaml data/personas/jordan.yaml
#   # edit it, then:
#   job-hunter run --persona jordan
#
# A "persona" is an anonymised candidate description that drives BOTH the job
# queries and the fit scorer. Results are stored per persona under
# data/roles/<id>/. Any file you create here (except this template and
# example.yaml) is git-ignored, so your real details never get committed.
#
# MINIMUM TO RUN: just one `lanes` entry with `title_terms`. Everything else is
# optional and has a safe default — but the more you fill in, the better the scoring.
#
# Tips:
#  - Keep it truthful: the fit score is only as honest as the skills you list.
#  - Use lowercase for every term in lists — matching is case-insensitive but
#    expects lowercase.
#  - Short tokens like "ml ", "ai " keep the trailing space on purpose (word
#    boundary) so they don't match inside other words.
#  - Delete the < ... > placeholders before running.
# ============================================================================

# Optional (default: filename). Short, unique, filename-safe id. Used in CLI + paths.
id: <your-id>

# Optional (default: the id). Display name (a pseudonym is fine).
name: <Display Name>

# Where you're based, free text. Used by the LLM enrichment for context only.
based_in: <City, Country>

# Optional (default: none). Informational; location ranking uses the global tiers in
# locations.py. List the countries you care about for your own reference.
target_countries: [Switzerland, Ireland, Netherlands, "United Kingdom"]

# City hints for location-aware providers (TheMuse). "City, Country" format.
target_cities:
  - "<City, Country>"
  - "<City, Country>"

# Whether remote roles outside the target countries are acceptable.
remote_ok: true

# *** THE ONLY HARD REQUIREMENT *** The career lanes you can credibly target (1-4).
# Each role is scored against every lane and keeps its best lane. `title_terms` match
# the job TITLE (strong signal); `boost_skills` match the full job description.
lanes:
  - id: <lane-id>                       # e.g. quant / ai / data / backend
    label: "<Human-readable lane name>"
    title_terms: ["<title keyword>", "<title keyword>"]
    boost_skills: ["<domain keyword>", "<domain keyword>"]
  # - id: <another-lane>
  #   label: "..."
  #   title_terms: [...]
  #   boost_skills: [...]

# Optional (default: empty) but strongly recommended. Your skills, in three honesty
# buckets. Each match adds to the score (strong > working > learning), capped.
skills:
  strong: ["<daily / production skill>", "<...>"]
  working: ["<solid but less central skill>", "<...>"]
  learning: ["<genuine but learner-level skill>", "<...>"]

# Optional (default: empty). Seniority signals. `fit` rewards a title match; others penalise.
seniority:
  fit: ["mid", "medior", "senior", "experienced"]
  too_junior: ["intern", "graduate", "working student", "trainee", "junior"]
  too_senior: ["head of", "director", "vp", "chief", "principal", "staff", "lead "]

# Optional (default: no role filter). Role-type gate (phase 1). A job TITLE must contain
# >=1 `core` term and NONE of the `exclude` terms. Leave empty to keep all role types.
role_gate:
  core: ["developer", "engineer", "quant", "data scientist", "machine learning", "scientist", "software"]
  exclude: ["manager", "consultant", "sales", "recruiter", "director", "designer", "marketing", "support"]

# OPTIONAL. Phrases that strongly reduce fit (wrong stack, hard blockers, wrong domain).
negative_signals: ["security clearance", "10+ years", "php", "wordpress", ".net", "manual tester"]

# OPTIONAL (default: none). Aspirational titles you aren't ready for yet — roles you'd
# like but can't credibly land today (e.g. new to AI -> "research scientist"). Strong
# negative in the scorer. Knowledge-overlap already down-weights skills you lack; this
# adds an explicit title-level penalty on top.
stretch_titles: ["research scientist", "researcher"]

# OPTIONAL. Your personal location preferences (1 = best). Omit to use the shipped
# defaults in src/job_hunter/locations.py. The location gate keeps any country you list
# here (or remote); the tier only affects ranking.
country_tiers:
  Switzerland: 1
  United Kingdom: 1
  Germany: 2
  # add the countries you care about, lower number = more preferred

# OPTIONAL. Per-city overrides (lowercase). A city's tier beats its country's, so you can
# say e.g. Amsterdam (1) above Utrecht (2), or Milan (3) above Rome (4).
city_tiers:
  # amsterdam: 1
  # utrecht: 2
